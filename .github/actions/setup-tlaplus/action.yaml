name: Set up TLA+
description: Set up Java and download the pinned tla2tools.jar

outputs:
  java-path:
    description: Path to the Java executable
    value: java
  tla2tools-jar:
    description: Path to the tla2tools.jar file
    value: ${{ github.workspace }}/tla2tools.jar

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: zulu
        java-version: "25"

    - name: Read the pinned tla2tools version from mise.toml
      id: pin
      shell: bash
      run: |
        version="$(sed -n 's/^tla2tools_version = "\(.*\)"$/\1/p' mise.toml)"
        if [ -z "$version" ]; then
          echo "::error::tla2tools_version not found in mise.toml" >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Cache tla2tools.jar
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: tla2tools.jar
        key: tla2tools-${{ steps.pin.outputs.version }}

    - name: Download tla2tools.jar
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL -o tla2tools.jar "https://github.com/tlaplus/tlaplus/releases/download/${{ steps.pin.outputs.version }}/tla2tools.jar"
