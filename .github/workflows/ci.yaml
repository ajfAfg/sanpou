name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: ["opened", "synchronize", "reopened"]

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        ocaml-compiler:
          - 5.2.0

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true

      # setup-ocaml intentionally does not cache the project dependencies
      # (https://github.com/ocaml/setup-ocaml#caching), so cache the local
      # switch ourselves, keyed on the committed dependency list.
      - name: Cache opam dependencies
        id: opam-deps
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: _opam
          key: opam-deps-${{ runner.os }}-${{ matrix.ocaml-compiler }}-${{ hashFiles('sanpou.opam') }}

      - name: Install opam dependencies
        if: steps.opam-deps.outputs.cache-hit != 'true'
        run: opam install . --deps-only --with-test

      - name: Set up TLA+
        uses: ./.github/actions/setup-tlaplus
        id: tlaplus

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest
        env:
          SANPOU_JAVA: ${{ steps.tlaplus.outputs.java-path }}
          SANPOU_TLA2TOOLS_JAR: ${{ steps.tlaplus.outputs.tla2tools-jar }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use OCaml 5.2.0
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: 5.2.0
          dune-cache: true

      - name: Cache opam dependencies
        id: opam-deps
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: _opam
          key: opam-deps-${{ runner.os }}-5.2.0-${{ hashFiles('sanpou.opam') }}

      - name: Install opam dependencies
        if: steps.opam-deps.outputs.cache-hit != 'true'
        run: opam install . --deps-only --with-test

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Lint opam file
        run: opam lint sanpou.opam

      - name: Check sanpou.opam is regenerated from dune-project
        run: |
          opam exec -- dune build sanpou.opam
          git diff --exit-code sanpou.opam

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Installs only actionlint (pinned in mise.toml [tools]), not the
      # whole toolchain.
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: actionlint

      - name: Run actionlint
        run: mise x -- actionlint -color
