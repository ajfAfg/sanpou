# Scheduled drift check: run the suite and model-check the shipped examples
# against the LATEST tla2tools.jar release (not the pin in mise.toml), so
# upstream TLA+ tools breakage is noticed before a deliberate pin bump.
# Non-blocking for PRs: schedule + manual dispatch only.
name: Drift

on:
  schedule:
    # Weekly, Monday 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DUNE_CACHE: enabled

jobs:
  test-latest-tla2tools:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Cache the opam root and local switch
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.opam
            _opam
          key: opam-${{ runner.os }}-${{ hashFiles('sanpou.opam', 'mise.toml') }}

      - name: Provision the opam switch
        run: mise run setup

      # Deliberately the latest release, not the mise.toml pin. It lands at
      # the project root, which is where mise.toml's [env] points
      # SANPOU_TLA2TOOLS_JAR.
      - name: Download the latest tla2tools.jar
        run: curl -fsSL -o tla2tools.jar https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar

      - name: Run tests
        run: mise x -- dune runtest

  model-check-examples:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Cache the opam root and local switch
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.opam
            _opam
          key: opam-${{ runner.os }}-${{ hashFiles('sanpou.opam', 'mise.toml') }}

      - name: Provision the opam switch
        run: mise run setup

      - name: Download the latest tla2tools.jar
        run: curl -fsSL -o tla2tools.jar https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar

      - name: Build the sanpou CLI
        run: mise x -- dune build bin/main.exe

      # Compile every shipped example that has a sidecar config and run TLC
      # on the generated spec. Each example finishes in a couple of seconds
      # locally; the step timeout is generous headroom.
      - name: Model-check the shipped examples
        timeout-minutes: 15
        run: |
          for snp in example/*.snp; do
            json="${snp%.snp}.json"
            if [ ! -f "$json" ]; then
              echo "Skipping $snp (no sidecar config)"
              continue
            fi
            name="$(basename "$snp" .snp)"
            out="dist/$name"
            mkdir -p "$out"
            mise x -- dune exec sanpou -- compile "$snp" -o "$out"
            # The generated file names come from the module name, which may
            # differ from the .snp file name (e.g. barrier.snp declares
            # `mod bakery_algorithm`), so glob for the generated config.
            for cfg in "$out"/*.cfg; do
              tla="${cfg%.cfg}.tla"
              echo "::group::TLC $tla"
              mise x -- java -XX:+UseParallelGC -jar tla2tools.jar -workers auto -config "$cfg" "$tla"
              echo "::endgroup::"
            done
          done
